<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Country Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #f5f2ee;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #888;
      --accent: #2c5f2e;
      --border: #e0dbd4;
    }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
 
    header {
      padding: 3rem 2rem 2rem;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
 
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }
 
    header p {
      color: var(--muted);
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }
 
    #status {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
 
    #status.error {
      color: #c0392b;
    }
 
    #countries-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
 
    .country-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
 
    .country-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }
 
    .country-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-bottom: 1px solid var(--border);
    }
 
    .card-body {
      padding: 1.2rem;
    }
 
    .card-body h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      margin-bottom: 0.6rem;
    }
 
    .card-body p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }
 
    .card-body p span {
      color: var(--text);
      font-weight: 500;
    }
 
    .region-tag {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.2rem 0.7rem;
      background: #eaf2ea;
      color: var(--accent);
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
 
  <header>
    <h1>Country Explorer</h1>
    <p>Browsing countries from the REST Countries API</p>
  </header>
 
  <div id="status">Loading countries...</div>
  <div id="countries-grid"></div>
 
  <script>
    const grid = document.getElementById('countries-grid');
    const status = document.getElementById('status');
 
    async function fetchCountries() {
      try {
        // Fetch all countries from the API
        const response = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,capital,population,region,languages');
 
        // Check if the response is OK
        if (!response.ok) {
          throw new Error(`API error: ${response.status}`);
        }
 
        const data = await response.json();
 
        // Log the full response so we can understand the JSON structure
        console.log('Full API response:', data);
        console.log('Example country object:', data[0]);
 
        // Hide loading message
        status.textContent = `Showing ${data.length} countries`;
 
        // Sort alphabetically by name
        data.sort((a, b) => a.name.common.localeCompare(b.name.common));
 
        // Display each country as a card
        data.forEach(country => {
          const card = document.createElement('div');
          card.classList.add('country-card');
 
          // Safely extract languages (nested object)
          const languages = country.languages
            ? Object.values(country.languages).join(', ')
            : 'N/A';
 
          // Safely extract capital (array)
          const capital = country.capital ? country.capital[0] : 'N/A';
 
          // Format population with commas
          const population = country.population
            ? country.population.toLocaleString()
            : 'N/A';
 
          card.innerHTML = `
            <img src="${country.flags?.png}" alt="Flag of ${country.name.common}" />
            <div class="card-body">
              <h2>${country.name.common}</h2>
              <p>Capital: <span>${capital}</span></p>
              <p>Population: <span>${population}</span></p>
              <p>Languages: <span>${languages}</span></p>
              <span class="region-tag">${country.region || 'Unknown'}</span>
            </div>
          `;
 
          grid.appendChild(card);
        });
 
      } catch (error) {
        // Handle errors gracefully
        console.error('Error fetching countries:', error);
        status.textContent = 'Something went wrong loading the data. Please try again later.';
        status.classList.add('error');
      }
    }
 
    // Run the fetch
    fetchCountries();
  </script>
 
</body>
</html>
